services:
  postgres:
    image: postgres:16-alpine
    container_name: trivy_postgres
    environment:
      POSTGRES_USER: trivy
      POSTGRES_PASSWORD: trivy_secret
      POSTGRES_DB: trivy_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trivy -d trivy_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trivy_api
    environment:
      DATABASE_URL: postgres://trivy:trivy_secret@postgres:5432/trivy_dashboard?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
