name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # chaque lundi à 6h UTC

jobs:
  trivy-scan:
    name: Scan & Upload to Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ github.repository }}:${{ github.sha }} .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ github.repository }}:${{ github.sha }}
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'   # ne pas faire échouer le pipeline ici

      - name: Upload report to dashboard
        env:
          DASHBOARD_URL: ${{ secrets.TRIVY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.TRIVY_API_KEY }}
        run: |
          curl -sf -X POST "${DASHBOARD_URL}/api/v1/report" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${API_KEY}" \
            -d "$(jq --null-input \
                  --arg project "${{ github.repository }}" \
                  --arg env "production" \
                  --arg owner "${{ github.actor }}" \
                  --slurpfile report trivy-report.json \
                  '{project_name: $project, environment: $env, owner: $owner, report: $report[0]}')"

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          echo "Critical vulnerabilities found: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::$CRITICAL critical vulnerabilities detected — check the dashboard"
            exit 1
          fi
