name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/trivy-dashboard
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  scan:
    needs: push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan & push to TrivyHub
        uses: theo-mrn/trivy_dashboard/.github/actions/trivy-push@main
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/trivy-dashboard:latest
          api-key: ${{ vars.DASHBOARD_API_KEY }}

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/trivy-dashboard:latest
            docker stop trivy-dashboard || true
            docker rm trivy-dashboard || true
            docker run -d \
              --name trivy-dashboard \
              --network trivy-net \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ${{ secrets.DOCKER_USERNAME }}/trivy-dashboard:latest
            echo "✓ trivy-dashboard deployed on :8080"
